name: Release

# Push a version tag to build and publish a downloadable .dmg:
#   git tag v0.1.0 && git push origin v0.1.0
# The DMG (Légendes.app + an Applications shortcut) is attached to a GitHub
# Release, which the website's "Download" button (…/releases/latest) points at.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: swift --version

      - name: Build app bundle (version from tag, icon baked in)
        env:
          LEGENDES_VERSION: ${{ github.ref_name }}
        run: ./scripts/build-app.sh

      - name: Make DMG
        run: |
          set -e
          APP="Légendes.app"
          VOL="Légendes"
          # Stable filename (no version) so the website can link directly to
          # /releases/latest/download/Legendes.dmg without going via the page.
          DMG="Legendes.dmg"
          STAGE="$(mktemp -d)"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "$VOL" -srcfolder "$STAGE" -ov -format UDZO "$DMG"
          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG="${GITHUB_REF_NAME:-manual-$(date +%s)}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG" --clobber
          else
            gh release create "$TAG" "$DMG" \
              --title "Légendes $TAG" --generate-notes
          fi
