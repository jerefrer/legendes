name: Release

# Push a version tag to build, sign, notarize and publish a downloadable .dmg:
#   git tag v0.1.0 && git push origin v0.1.0
# Signing/notarization runs only if the signing secrets are configured (see
# README → "Signing & notarization"); otherwise the app is ad-hoc signed.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    env:
      HAS_SIGNING: ${{ secrets.MACOS_CERT_P12_BASE64 != '' }}
      HAS_SPARKLE: ${{ secrets.SPARKLE_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: swift --version

      - name: Import Developer ID certificate
        if: env.HAS_SIGNING == 'true'
        env:
          P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KPW="$(uuidgen)"
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KPW" "$KEYCHAIN" >/dev/null
          # Put our keychain first in the search list so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" | awk -F'"' '/Developer ID Application/{print $2; exit}')"
          test -n "$IDENTITY"
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "Using identity: $IDENTITY"

      - name: Build app bundle (version from tag, icon baked in, signed if available)
        env:
          LEGENDES_VERSION: ${{ github.ref_name }}
          # Public key (not secret); accept it whether stored as a repo Variable or Secret.
          SPARKLE_PUBLIC_KEY: ${{ vars.SPARKLE_PUBLIC_KEY || secrets.SPARKLE_PUBLIC_KEY }}
        run: ./scripts/build-app.sh

      - name: Make DMG
        run: |
          set -euo pipefail
          APP="Légendes.app"
          VOL="Légendes"
          DMG="Legendes.dmg"   # stable name → /releases/latest/download/Legendes.dmg
          STAGE="$(mktemp -d)"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "$VOL" -srcfolder "$STAGE" -ov -format UDZO "$DMG"
          if [ "${HAS_SIGNING}" = "true" ]; then
            codesign --force --timestamp --sign "$SIGN_IDENTITY" "$DMG"
          fi
          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: Notarize & staple
        if: env.HAS_SIGNING == 'true'
        env:
          AC_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_KEY_P8_BASE64: ${{ secrets.AC_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          echo "$AC_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/ac_key.p8"
          xcrun notarytool submit "$DMG" \
            --key "$RUNNER_TEMP/ac_key.p8" --key-id "$AC_KEY_ID" --issuer "$AC_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          # Staple the standalone app too (its cdhash was notarized via the DMG),
          # so the Sparkle update archive contains a stapled, Gatekeeper-clean app.
          xcrun stapler staple "Légendes.app"

      - name: Sparkle update archive + appcast
        if: env.HAS_SIGNING == 'true' && env.HAS_SPARKLE == 'true'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          mkdir -p sparkle_out
          # The update Sparkle downloads & installs: a zip of the notarized,
          # stapled app (Sparkle prefers a .zip over a .dmg for auto-install).
          ditto -c -k --sequesterRsrc --keepParent "Légendes.app" "sparkle_out/Legendes.zip"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_key"
          TOOLS="$(find .build/artifacts -path '*/Sparkle/bin' -type d | head -1)"
          "$TOOLS/generate_appcast" --ed-key-file "$RUNNER_TEMP/sparkle_key" \
            --download-url-prefix "https://github.com/jerefrer/legendes/releases/download/${TAG}/" \
            sparkle_out
          echo "SPARKLE_ZIP=sparkle_out/Legendes.zip" >> "$GITHUB_ENV"
          echo "APPCAST=sparkle_out/appcast.xml" >> "$GITHUB_ENV"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-manual-$(date +%s)}"
          ASSETS=("$DMG")
          [ -n "${SPARKLE_ZIP:-}" ] && ASSETS+=("$SPARKLE_ZIP" "$APPCAST")
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$TAG" "${ASSETS[@]}" --title "Légendes $TAG" --generate-notes
          fi
