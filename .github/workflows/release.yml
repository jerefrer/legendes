name: Release

# Push a version tag to build and publish a downloadable .app:
#   git tag v0.1.0 && git push origin v0.1.0
# The zipped Légendes.app is attached to a GitHub Release, which the website's
# "Download" button (…/releases/latest) and future auto-update both point at.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: swift --version

      - name: Build app bundle
        run: ./scripts/build-app.sh

      - name: Zip the app (preserving the bundle)
        run: ditto -c -k --sequesterRsrc --keepParent "Légendes.app" "Legendes.zip"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG="${GITHUB_REF_NAME:-manual-$(date +%s)}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "Legendes.zip" --clobber
          else
            gh release create "$TAG" "Legendes.zip" \
              --title "Légendes $TAG" --generate-notes
          fi
