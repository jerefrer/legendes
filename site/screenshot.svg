<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 700" width="1024" height="700" role="img" aria-label="Légendes — app preview">
  <defs>
    <linearGradient id="win" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15171c"/><stop offset="1" stop-color="#0e0f13"/>
    </linearGradient>
    <linearGradient id="scene" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#243244"/><stop offset="0.55" stop-color="#2b3a4d"/><stop offset="1" stop-color="#10151c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2d6cdf"/><stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <style>
      text{font-family:-apple-system,'SF Pro Text','Helvetica Neue',Arial,sans-serif;}
      .sec{fill:#8a909a;font-size:12px;letter-spacing:1.5px;font-weight:600;}
      .body{fill:#f3f4f6;font-size:19px;}
      .btn{fill:#cfd3d9;font-size:14px;font-weight:600;}
      .time{fill:#e8eaed;font-size:18px;font-weight:600;font-variant-numeric:tabular-nums;}
      .dim{fill:#8a909a;}
      .lbl{fill:#8a909a;font-size:11px;letter-spacing:1px;font-weight:700;}
    </style>
  </defs>

  <!-- window -->
  <rect x="8" y="8" width="1008" height="684" rx="16" fill="url(#win)" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- title bar -->
  <circle cx="44" cy="40" r="7.5" fill="#ff5f57"/><circle cx="70" cy="40" r="7.5" fill="#febc2e"/><circle cx="96" cy="40" r="7.5" fill="#28c840"/>
  <!-- undo/redo pill -->
  <rect x="128" y="24" width="92" height="33" rx="16.5" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.10"/>
  <path d="M158 40 a8 8 0 1 1 3 6" fill="none" stroke="#9aa0a8" stroke-width="2.4" stroke-linecap="round"/><path d="M150 34 v8 h8" fill="none" stroke="#9aa0a8" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M190 40 a8 8 0 1 0 -3 6" fill="none" stroke="#5b6068" stroke-width="2.4" stroke-linecap="round"/><path d="M198 34 v8 h-8" fill="none" stroke="#5b6068" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- centered saved -->
  <circle cx="476" cy="40" r="8" fill="#28c840"/><path d="M472 40 l3 3 l5 -6" fill="none" stroke="#0e0f13" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="492" y="45" class="dim" font-size="15" font-weight="600">Saved</text>
  <!-- right controls -->
  <rect x="724" y="24" width="120" height="33" rx="9" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.10"/>
  <text x="742" y="45" fill="#e8eaed" font-size="13" font-weight="700">A</text><text x="775" y="45" fill="#9aa0a8" font-size="16" font-weight="700">A</text><text x="812" y="45" fill="#9aa0a8" font-size="19" font-weight="700">A</text>
  <rect x="856" y="24" width="104" height="33" rx="9" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.10"/>
  <circle cx="878" cy="40" r="8" fill="none" stroke="#cfd3d9" stroke-width="2"/><path d="M878 32 a8 8 0 0 1 0 16 z" fill="#cfd3d9"/>
  <circle cx="912" cy="40" r="7" fill="none" stroke="#9aa0a8" stroke-width="2"/>
  <path d="M940 33 a9 9 0 1 0 7 4 a6 6 0 1 1 -7 -4 z" fill="#9aa0a8"/>
  <rect x="972" y="24" width="0" height="0"/>

  <!-- video pane (neutral abstract scene, letterboxed) -->
  <rect x="24" y="72" width="976" height="300" rx="10" fill="#000000"/>
  <rect x="300" y="72" width="424" height="300" fill="url(#scene)"/>
  <circle cx="620" cy="180" r="34" fill="#e9c98a" fill-opacity="0.85"/>
  <path d="M300 300 q120 -52 230 -8 q110 44 194 6 v74 h-424 z" fill="#1a2430" fill-opacity="0.9"/>
  <path d="M300 322 q150 -30 240 4 q120 36 184 2 v44 h-424 z" fill="#0f1620"/>

  <!-- transport -->
  <circle cx="56" cy="416" r="22" fill="url(#accent)"/><path d="M50 406 l16 10 l-16 10 z" fill="#fff"/>
  <rect x="96" y="413" width="760" height="6" rx="3" fill="#2a2d33"/>
  <rect x="96" y="413" width="150" height="6" rx="3" fill="url(#accent)"/>
  <circle cx="246" cy="416" r="9" fill="#fff"/>
  <text x="880" y="423" class="time">0:12.500 <tspan class="dim">/ 1:00.000</tspan></text>

  <!-- section card -->
  <rect x="24" y="456" width="976" height="150" rx="14" fill="#1b1d22" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="48" y="486" class="sec">SECTION 3 · 0:12 – 0:20</text>
  <rect x="48" y="500" width="928" height="44" rx="9" fill="#0f1115" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="64" y="528" class="body">Wide shot of the venue</text>

  <!-- action row -->
  <g>
    <rect x="48" y="558" width="158" height="34" rx="9" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-opacity="0.4"/>
    <text x="70" y="580" fill="#f08a8a" font-size="13" font-weight="600">↥ Merge with previous</text>

    <text x="250" y="572" class="lbl">START</text>
    <rect x="250" y="578" width="44" height="20" rx="6" fill="#2d6cdf" fill-opacity="0.16" stroke="#2d6cdf" stroke-opacity="0.4"/><text x="259" y="592" fill="#7fa6ec" font-size="11" font-weight="600">−1 s</text>
    <rect x="300" y="578" width="44" height="20" rx="6" fill="#2d6cdf" fill-opacity="0.16" stroke="#2d6cdf" stroke-opacity="0.4"/><text x="309" y="592" fill="#7fa6ec" font-size="11" font-weight="600">+1 s</text>

    <rect x="436" y="556" width="150" height="38" rx="10" fill="url(#accent)"/>
    <text x="476" y="580" fill="#fff" font-size="15" font-weight="700">✂ Cut here</text>

    <rect x="678" y="578" width="44" height="20" rx="6" fill="#2d6cdf" fill-opacity="0.16" stroke="#2d6cdf" stroke-opacity="0.4"/><text x="687" y="592" fill="#7fa6ec" font-size="11" font-weight="600">−1 s</text>
    <rect x="728" y="578" width="44" height="20" rx="6" fill="#2d6cdf" fill-opacity="0.16" stroke="#2d6cdf" stroke-opacity="0.4"/><text x="737" y="592" fill="#7fa6ec" font-size="11" font-weight="600">+1 s</text>
    <text x="784" y="572" class="lbl">END</text>

    <rect x="824" y="558" width="152" height="34" rx="9" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-opacity="0.4"/>
    <text x="844" y="580" fill="#f08a8a" font-size="13" font-weight="600">Merge with next ↧</text>
  </g>

  <!-- timeline -->
  <rect x="24" y="626" width="976" height="46" rx="8" fill="#16181d"/>
  <g fill="#6b7079">
    <rect x="44" y="640" width="3" height="18"/><rect x="74" y="640" width="3" height="18"/><rect x="110" y="640" width="3" height="18"/><rect x="150" y="640" width="3" height="18"/><rect x="196" y="640" width="3" height="18"/>
  </g>
  <rect x="232" y="636" width="150" height="26" rx="5" fill="url(#accent)"/>
  <g fill="#6b7079">
    <rect x="410" y="640" width="3" height="18"/><rect x="452" y="640" width="3" height="18"/><rect x="500" y="640" width="3" height="18"/><rect x="556" y="640" width="3" height="18"/><rect x="612" y="640" width="3" height="18"/><rect x="676" y="640" width="3" height="18"/><rect x="740" y="640" width="3" height="18"/><rect x="812" y="640" width="3" height="18"/><rect x="884" y="640" width="3" height="18"/><rect x="956" y="640" width="3" height="18"/>
  </g>
</svg>
