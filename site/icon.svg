<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Légendes app icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <!-- App-style rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#bg)"/>
  <!-- Screen -->
  <rect x="112" y="120" width="288" height="208" rx="24" fill="#ffffff" fill-opacity="0.16"/>
  <rect x="112" y="120" width="288" height="208" rx="24" fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="3"/>
  <!-- Caption lines (the "légendes") -->
  <rect x="148" y="356" width="216" height="22" rx="11" fill="#ffffff" fill-opacity="0.95"/>
  <rect x="148" y="396" width="140" height="22" rx="11" fill="#ffffff" fill-opacity="0.55"/>
</svg>
